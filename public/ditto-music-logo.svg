<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="barGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Equalizer bars -->
  <g filter="url(#glow)">
    <rect x="12" y="28" width="6" height="24" rx="2" fill="url(#barGlow)"/>
    <rect x="22" y="18" width="6" height="44" rx="2" fill="url(#barGlow)"/>
    <rect x="32" y="24" width="6" height="32" rx="2" fill="url(#barGlow)"/>
    <rect x="42" y="14" width="6" height="52" rx="2" fill="url(#barGlow)"/>
  </g>
  
  <!-- "ditto" text -->
  <text x="60" y="50" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">ditto</text>
  
  <!-- "music" text -->
  <text x="180" y="50" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="300" fill="#a855f7" letter-spacing="-1">music</text>
</svg>
