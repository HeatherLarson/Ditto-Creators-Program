<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <defs>
    <linearGradient id="barGlowStacked" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="1"/>
    </linearGradient>
    <filter id="glowStacked" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Equalizer bars icon -->
  <g filter="url(#glowStacked)" transform="translate(70, 8)">
    <rect x="0" y="20" width="8" height="28" rx="3" fill="url(#barGlowStacked)"/>
    <rect x="14" y="8" width="8" height="52" rx="3" fill="url(#barGlowStacked)"/>
    <rect x="28" y="14" width="8" height="40" rx="3" fill="url(#barGlowStacked)"/>
    <rect x="42" y="4" width="8" height="60" rx="3" fill="url(#barGlowStacked)"/>
  </g>
  
  <!-- "ditto" text -->
  <text x="100" y="95" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">ditto</text>
  
  <!-- "music" text -->
  <text x="100" y="115" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#a855f7" text-anchor="middle" letter-spacing="3" text-transform="uppercase">MUSIC</text>
</svg>
